<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />

  <!-- OG / WhatsApp preview — populated dynamically by app.js from event.json -->
  <meta property="og:type"  content="website" />

  <title>Cargando invitación…</title>

  <!-- Font Awesome (icons) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- Google Fonts injected dynamically by ThemeEngine from theme.json -->

  <!-- App stylesheet -->
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body class="is-loading">

  <!-- ════════════════════════════════════════════
       0. SPLASH — pantalla de entrada animada
       ════════════════════════════════════════════ -->
  <div id="splash-screen" role="dialog" aria-modal="true" aria-label="Pantalla de bienvenida">
    <div class="splash__envelope" aria-hidden="true">
      <!-- SVG Envelope -->
      <svg class="envelope-svg" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="env-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:var(--color-accent);stop-opacity:0.9"/>
            <stop offset="100%" style="stop-color:var(--color-accent);stop-opacity:0.6"/>
          </linearGradient>
        </defs>
        <!-- Envelope body -->
        <rect class="env-body" x="10" y="50" width="180" height="100" rx="4" fill="var(--color-surface)" stroke="var(--color-accent)" stroke-width="1.5"/>
        <!-- Inner fold lines -->
        <line x1="10" y1="50" x2="100" y2="110" stroke="var(--color-accent)" stroke-width="0.8" opacity="0.3"/>
        <line x1="190" y1="50" x2="100" y2="110" stroke="var(--color-accent)" stroke-width="0.8" opacity="0.3"/>
        <!-- Flap (animated) -->
        <polygon class="env-flap" points="10,50 100,10 190,50" fill="url(#env-grad)" stroke="var(--color-accent)" stroke-width="1.5"/>
        <!-- Heart seal -->
        <text x="100" y="115" text-anchor="middle" fill="var(--color-accent)" font-size="20" opacity="0.6">♥</text>
      </svg>
    </div>
    <div class="splash__content">
      <p class="splash__pre">Te invitamos a</p>
      <h2 class="splash__name"><!-- populated from JS --></h2>
      <button id="splash-btn" class="splash__btn">
        Abrir invitación
        <span class="splash__btn-icon" aria-hidden="true">✉</span>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
       DOM Shells — content injected by sections.js
       Each id maps 1:1 to a render function.
       ════════════════════════════════════════════ -->

  <!-- 0.5. Welcome Message -->
  <section id="section-welcome" class="section" aria-label="Mensaje de bienvenida"></section>

  <!-- 1. Hero -->
  <section id="section-hero" class="section" aria-label="Portada"></section>

  <!-- 2. Countdown -->
  <section id="section-countdown" aria-label="Cuenta regresiva"></section>

  <!-- 3. Event Details -->
  <section id="section-event" class="section section--alt" aria-label="Detalles del evento"></section>

  <!-- 4. Gallery -->
  <section id="section-gallery" class="section" aria-label="Galería de fotos"></section>

  <!-- 5. Dress Code -->
  <section id="section-dresscode" class="section section--alt" aria-label="Código de vestimenta"></section>

  <!-- 6. RSVP -->
  <section id="section-rsvp" class="section" aria-label="Confirmación de asistencia"></section>

  <!-- 7. Footer — rendered inline, content from config -->
  <footer id="section-footer"></footer>

  <!-- 8. Music (fixed floating button) -->
  <div id="music-control" aria-label="Control de música"></div>

  <!-- ════════════════════════════════════════════
       App entry point — ES Modules
       ════════════════════════════════════════════ -->
  <script type="module" src="components/app.js"></script>

  <!-- Inline footer render (no component needed, simple content) -->
  <script type="module">
    import ConfigLoader from './components/ConfigLoader.js';
    ConfigLoader.load().then(config => {
      const f = document.getElementById('section-footer');
      if (!f || !config.footer) return;
      f.innerHTML = `
        <p class="footer__message">${config.footer.message}</p>
        <p class="footer__brand">
          Hecho con ♥ por
          <a href="${config.footer.brandUrl}" target="_blank" rel="noopener">${config.footer.brand}</a>
        </p>
      `;
    });
  </script>
</body>
</html>
