<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta property="og:type" content="website" />

  <title>Cargando invitación…</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous" />

  <!-- Google Fonts inyectadas por ThemeEngine desde theme.json -->

  <!-- Estilos del template -->
  <link rel="stylesheet" href="../../templates/boda/styles/main.css" />
</head>

<body class="is-loading">

  <!-- ── Audio (src asignado por renderMusicControl) ───── -->
  <audio id="bg-audio" loop preload="none"></audio>

  <!-- ── Botón de música (fixed, top-right) ────────────── -->
  <button id="music-btn" aria-label="Reproducir música">
    <i class="fa-solid fa-music" aria-hidden="true"></i>
  </button>

  <!-- ── Dots de navegación lateral ───────────────────── -->
  <nav id="side-nav" aria-label="Navegación por capítulos"></nav>

  <!-- ── Contador de capítulo ──────────────────────────── -->
  <div id="chapter-counter" aria-live="polite"></div>

  <!-- ── Flechas de navegación ─────────────────────────── -->
  <nav class="chapter-nav" aria-label="Anterior / Siguiente capítulo">
    <button class="chapter-nav__btn" id="btn-prev" aria-label="Capítulo anterior">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
    </button>
    <button class="chapter-nav__btn" id="btn-next" aria-label="Capítulo siguiente">
      <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
    </button>
  </nav>

  <!-- ════════════════════════════════════════
       0. SPLASH — pantalla de entrada animada
       ════════════════════════════════════════ -->
  <div id="splash-screen" role="dialog" aria-modal="true" aria-label="Pantalla de bienvenida">
    <div class="splash__curtain" aria-hidden="true">
      <div class="splash__curtain-left"></div>
      <div class="splash__curtain-right"></div>
    </div>
    <div class="splash__content">
      <p class="splash__pre">Te invitamos a</p>
      <h2 class="splash__name"><!-- populated from JS --></h2>
      <button id="splash-btn" class="splash__btn" type="button">
        Abrir invitación
        <span class="splash__btn-icon" aria-hidden="true">✉</span>
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       STAGE — los capítulos se inyectan aquí
       ════════════════════════════════════════ -->
  <div id="stage">
    <section id="ch-welcome" class="chapter" aria-label="Mensaje de bienvenida"></section>
    <section id="ch-hero" class="chapter" aria-label="Portada"></section>
    <section id="ch-story" class="chapter" aria-label="Nuestra historia"></section>
    <section id="ch-countdown" class="chapter" aria-label="Cuenta regresiva"></section>
    <section id="ch-details" class="chapter" aria-label="El gran día"></section>
    <section id="ch-itinerary" class="chapter" aria-label="Itinerario"></section>
    <section id="ch-gallery" class="chapter" aria-label="Galería"></section>
    <section id="ch-dresscode" class="chapter" aria-label="Vestimenta"></section>
    <section id="ch-gifts" class="chapter" aria-label="Mesa de regalos"></section>
    <section id="ch-rsvp" class="chapter" aria-label="Confirmar asistencia"></section>
  </div>

  <!-- ════════════════════════════════════════
       Entry point — ES Modules
       ════════════════════════════════════════ -->
  <script type="module">
    import App, { bootstrap } from '../../core/engine/App.js';
    import * as bodaSections from '../../templates/boda/sections/sections.js';

    // Registrar renderizadores del template boda
    App.registerRenderers(bodaSections);

    // Inicializar aplicación
    bootstrap({
      template: 'boda',
      eventConfig: './config/event.json',
      themeConfig: './config/theme.json',
      chapters: [
        { id: 'ch-welcome', label: 'Bienvenida' },
        { id: 'ch-hero', label: 'Portada' },
        { id: 'ch-story', label: 'Nuestra historia' },
        { id: 'ch-countdown', label: 'Cuenta regresiva' },
        { id: 'ch-details', label: 'El gran día' },
        { id: 'ch-itinerary', label: 'Itinerario' },
        { id: 'ch-gallery', label: 'Galería' },
        { id: 'ch-dresscode', label: 'Vestimenta' },
        { id: 'ch-gifts', label: 'Mesa de regalos' },
        { id: 'ch-rsvp', label: 'Confirmar' },
      ],
      renderOrder: [
        { id: 'renderMeta', args: [] },
        { id: 'renderSplash', args: [] },
        { id: 'renderWelcome', args: [] },
        { id: 'renderHero', args: [] },
        { id: 'renderStory', args: [] },
        { id: 'renderCountdown', args: [] },
        { id: 'renderDetails', args: [] },
        { id: 'renderItinerary', args: [] },
        { id: 'renderGallery', args: [] },
        { id: 'renderDressCode', args: [] },
        { id: 'renderGiftRegistry', args: [] },
        { id: 'renderRSVP', args: [] },
        { id: 'renderMusicControl', args: [] },
      ],
    });
  </script>

</body>

</html>
